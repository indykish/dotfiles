# tmux defaults for macOS + Artificial Intelligence (AI) coding tool Terminal
# User Interface (TUI) sessions: Claude, OpenCode, Amp, and Codex.

# Keep the stock prefix so Control-a still moves to the start of the prompt in
# readline-style inputs. Stealing Control-a here is annoying in AI coding tools.
set -g prefix C-b
bind C-b send-prefix

# Terminal capabilities: true colour, focus events, hyperlinks, and extended
# key reporting for Shift+Enter.
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -g focus-events on
set -g allow-passthrough all

if-shell -F "#{>=:#{version},3.2}" {
  set -g terminal-features "xterm*:RGB:extkeys,*:hyperlinks"
  set -s extended-keys on
}

if-shell -F "#{>=:#{version},3.5}" {
  set -g extended-keys-format csi-u
}

# General session behaviour.
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -sg escape-time 0
set -g history-limit 200000
set -g detach-on-destroy off

# Mouse + copy mode: useful for reviewing code, scrolling back through an AI
# transcript, and copying handoff prompts without leaving tmux.
set -g mouse on
setw -g mode-keys vi
set -s set-clipboard on

bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

if-shell "command -v pbcopy >/dev/null 2>&1" {
  set -s copy-command "pbcopy"
  bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
}

# Shift+Enter should insert a newline in Amp and other prompt editors instead
# of submitting the message. iTerm2 may also need a profile key mapping that
# sends Escape Sequence "[13;2u" for Shift+Enter.
bind-key -n S-Enter send-keys Escape \; send-keys -l "[13;2u"

# Splits and new windows inherit the current working directory.
bind-key | split-window -h -c "#{pane_current_path}"
bind-key - split-window -v -c "#{pane_current_path}"
bind-key c new-window -c "#{pane_current_path}"

# Pane movement and resizing.
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

bind-key -r H resize-pane -L 5
bind-key -r J resize-pane -D 5
bind-key -r K resize-pane -U 5
bind-key -r L resize-pane -R 5

# Layout helpers.
bind-key m select-layout main-horizontal
bind-key M select-layout main-vertical

if-shell -F "#{>=:#{version},3.2}" {
  bind-key t display-popup -E -w 85% -h 85%
}

# Session tools.
bind-key r source-file ~/.tmux.conf \; display-message "tmux reloaded"
bind-key N command-prompt -p "Window name" "new-window -n '%%'"

# Minimal status line.
set -g status-position bottom
set -g status-justify centre
set -g status-interval 5
set -g status-left-length 40
set -g status-right-length 80
set -g status-left "#S"
set -g status-right "%Y-%m-%d %H:%M"

set -g status-style bg=colour235,fg=colour136
setw -g window-status-style fg=colour244,bg=default
setw -g window-status-current-style fg=colour166,bg=default,bold
set -g pane-border-style fg=colour61
set -g pane-active-border-style fg=colour64
set -g message-style bg=colour235,fg=colour166

if-shell -F "#{>=:#{version},3.3}" {
  set -g pane-border-indicators arrows
}
